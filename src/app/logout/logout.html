<div class="card login rounded-0" style="width: 300px;">
    <div class="d-flex justify-content-center card-header rounded-0" style="background-color: lightgreen;">
        <h5>Log out?</h5>
    </div>
    <div class="card-body">
        <div class="d-flex justify-content-between align-items-center w-100">

            <button class="btn btn-outline-success rounded-0" (click)="cancel()">
                <a routerLink="/Home">Cancel</a>
            </button>

            <button class="btn btn-outline-danger rounded-0" (click)="Logout()">
                Logout
            </button>

        </div>
    </div>
</div>
