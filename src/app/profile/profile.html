<div class="row">
    <div class="col-12 col-md-8">
        <form [formGroup]="profileForm" (ngSubmit)="onProfileSubmit()">
            <div class="card mb-3 rounded-0">
                <div class="card-header" style="background-color: lightgreen;">
                    <!-- <img [src]="`https://ui-avatars.com/api/?name=${currentUser()!.firstName}%20${currentUser()!.lastName}`"> -->
                    <h5>Edit Profile</h5>
                </div>
                <div class="card-body">
                    <div class="mb-3">
                        <label for="name" class="form-label">Name</label>
                        <input type="text" class="form-control rounded-0" id="name" formControlName="name">
                    </div>
                    <div class="mb-3">
                        <label for="surname" class="form-label">Surname</label>
                        <input type="text" class="form-control rounded-0" id="surname" formControlName="surname">
                    </div>
                    <div class="mb-3">
                        <label for="phone" class="form-label">Phone Number</label>
                        <input type="tel" class="form-control rounded-0" id="phone" formControlName="phone">
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input type="text" class="form-control rounded-0" id="email" formControlName="email">
                    </div>
                </div>
                <div class="card-footer">
                    <button class="btn btn-outline-success rounded-0">
                        Save Changes
                    </button>
                </div>
            </div>
        </form>
    </div>
    <div class="col-12 col-md-4">
        <form [formGroup]="passwordForm" (ngSubmit)="onPasswordSubmit()">
            <div class="card mb-3 rounded-0">
                <div class="card-header btn-success rounded-0" style="background-color: lightgreen;">
                    <h5>Reset Password</h5>
                </div>
                <div class="card-body">
                    <div class="mb-3">
                        <label for="current" class="form-label rounded-0">Current Password</label>
                        <input type="password" class="form-control rounded-0" id="current" formControlName="current">
                    </div>
                    <div class="mb-3">
                        <label for="new" class="form-label rounded-0">New Password</label>
                        <input type="password" class="form-control rounded-0" id="new" formControlName="new">
                    </div>
                    <div class="mb-3">
                        <label for="repeat" class="form-label rounded-0">Repeat Password</label>
                        <input type="password" class="form-control rounded-0" id="repeat" formControlName="repeat">
                    </div>
                </div>
                <div class="card-footer">
                    <button  class="btn btn-outline-success rounded-0">
                         Change Password
                    </button>
                </div>
            </div>
        </form>
    </div>
</div>
