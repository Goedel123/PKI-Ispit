<div class="card login  rounded-0">
    <div class="d-flex justify-content-center card-header rounded-0" style="background-color: lightgreen;">
        <h5>Signup</h5>
    </div>
    <div class="card-body">
        <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
            <div class="row">
                <div class="mb-2 rounded-0">
                    <label for="name" class="form-label">Name</label>
                    <input type="text" class="form-control rounded-0" id="name" formControlName="firstName">
                </div>
                <div class="mb-2">
                    <label for="surname" class="form-label">Surname</label>
                    <input type="text" class="form-control rounded-0" id="surname" formControlName="lastName">
                </div>
            </div>
            <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email" class="form-control rounded-0" id="email" formControlName="email">
            </div>
            <div class="mb-3">
                <label for="phone" class="form-label">Phone Number</label>
                <input type="tel" class="form-control rounded-0" id="phone" formControlName="phone">
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control rounded-0" id="password" formControlName="password">
            </div>
            <div class="mb-3  rounded-0">
                <label for="repeat" class="form-label">Confirm Password</label>
                <input type="password" class="form-control" id="repeat" formControlName="repeat">
            </div>
            <label>
                <input type="checkbox" id="checkbox" formControlName="checkbox">
                <a href="/toc"> I accept the terms of service. </a>
            </label>
            <div class="d-flex justify-content-center">
                <button type="submit" class="btn btn-outline-success  rounded-0">
                    Register
                </button>
            </div>
        </form>
    </div>
</div>
